<svg width="500" height="300" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
    <g>
        <!-- Símbolo < -->
        <g>
            <polyline 
                points="32,16 14,30 32,44" 
                fill="none" stroke="#ffffff" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round"
            />
            <circle cx="32" cy="16" r="3.5" fill="#ffffff" />
            <circle cx="14" cy="30" r="3.5" fill="#ffffff" />
            <circle cx="32" cy="44" r="3.5" fill="#ffffff" />
        </g>

        <!-- Separador / -->
        <g>
            <line 
                x1="44" y1="52" 
                x2="56" y2="8" 
                stroke="#ffffff" stroke-width="3.5"
                stroke-linecap="round"
            />
            <circle cx="44" cy="52" r="3.5" fill="#ffffff" />
            <circle cx="56" cy="8" r="3.5" fill="#ffffff" />
        </g>

        <!-- Símbolo > -->
        <g>
            <polyline 
                points="68,17 86,31 68,45" 
                fill="none" stroke="#ffffff" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round"
            />
            <circle cx="68" cy="17" r="3.5" fill="#ffffff" />
            <circle cx="86" cy="31" r="3.5" fill="#ffffff" />
            <circle cx="68" cy="45" r="3.5" fill="#ffffff" />
        </g>
    </g>
</svg>
